syntax = "proto3";

option go_package = "./pb";

import "buf/validate/validate.proto";

message AuthRequest {
  string username = 1 [(buf.validate.field).string = {
    min_len: 3
    max_len: 32
    pattern: "^[a-zA-Z0-9_]+$"
  }];
  string password = 2 [(buf.validate.field).string = {
    min_len: 8
    max_len: 72
  }];
}

message AuthResponse {
  string token = 1;
  uint64 user_id = 2;
}

message ChangePasswordRequest {
  string old_password = 1 [(buf.validate.field).string = {
    min_len: 8
    max_len: 16
  }];
  string new_password = 2 [(buf.validate.field).string = {
    min_len: 8
    max_len: 16
  }];
}

message ValidateTokenRequest {
  string token = 1 [(buf.validate.field).string = {
    min_len: 16
    max_len: 2048
  }];
}

message ValidateTokenResponse {
  bool is_valid = 1;
}

service AuthService {
  rpc Login          (AuthRequest)           returns (AuthResponse);
  rpc Register       (AuthRequest)           returns (AuthResponse);
  rpc ChangePassword (ChangePasswordRequest) returns (AuthResponse);
  rpc ValidateToken  (ValidateTokenRequest)  returns (ValidateTokenResponse);
}
